<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Search App</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .container {
    width: 400px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
  }

  input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    margin-bottom: 15px;
    font-size: 14px;
  }

  input:focus {
    border-color: #007bff;
    outline: none;
  }

  .item {
    padding: 10px;
    border-bottom: 1px solid #eee;
  }

  .item:last-child {
    border-bottom: none;
  }

  .name {
    font-weight: bold;
  }

  .email {
    font-size: 12px;
    color: gray;
  }

  .loading, .no-results {
    text-align: center;
    color: gray;
    padding: 10px;
  }

  mark {
    background: yellow;
  }
</style>
</head>

<body>

<div class="container">
  <h2>User Search</h2>

  <!-- Search Input -->
  <input type="text" id="search" placeholder="Type to search users..." />

  <!-- Status -->
  <div id="status" class="loading">Loading...</div>

  <!-- Results -->
  <div id="results"></div>
</div>

<script>
let users = [];
const resultsDiv = document.getElementById("results");
const statusDiv = document.getElementById("status");
const searchInput = document.getElementById("search");

// Fetch API Data
async function fetchData() {
  try {
    const res = await fetch("https://jsonplaceholder.typicode.com/users");
    users = await res.json();

    statusDiv.style.display = "none";
    displayResults(users);
  } catch (error) {
    statusDiv.textContent = "Failed to load data";
  }
}

// Display Results
function displayResults(data, keyword = "") {
  resultsDiv.innerHTML = "";

  if (data.length === 0) {
    resultsDiv.innerHTML = `<div class="no-results">No results found</div>`;
    return;
  }

  data.forEach(user => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="name">${highlight(user.name, keyword)}</div>
      <div class="email">${highlight(user.email, keyword)}</div>
    `;

    resultsDiv.appendChild(div);
  });
}

// Highlight Matches
function highlight(text, keyword) {
  if (!keyword) return text;
  const regex = new RegExp(`(${keyword})`, "gi");
  return text.replace(regex, "<mark>$1</mark>");
}

// Debounce Function
function debounce(func, delay) {
  let timer;
  return function() {
    clearTimeout(timer);
    timer = setTimeout(() => func.apply(this, arguments), delay);
  };
}

// Handle Search
const handleSearch = debounce(() => {
  const keyword = searchInput.value.toLowerCase();

  const filtered = users.filter(user =>
    user.name.toLowerCase().includes(keyword) ||
    user.email.toLowerCase().includes(keyword)
  );

  displayResults(filtered, keyword);
}, 300);

// Event Listener
searchInput.addEventListener("input", handleSearch);

// Start Experiment
fetchData();
</script>

</body>
</html>
