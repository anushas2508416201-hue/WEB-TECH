<!DOCTYPE html>
<html>
<head>
<title>Dynamic Webpage with jQuery Effects</title>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
#box{
width:200px;
height:200px;
background-color:skyblue;
margin-top:20px;
text-align:center;
line-height:200px;
font-weight:bold;
}
</style>
</head>

<body>

<h2 id="title">Welcome to My Webpage</h2>

<button onclick="changeContent()">Change Content</button>
<button id="hideBtn">Hide</button>
<button id="showBtn">Show</button>
<button id="toggleBtn">Toggle</button>
<button id="animateBtn">Animate</button>

<div id="box">BOX</div>

<script>

// JavaScript DOM content update
function changeContent(){
document.getElementById("title").innerHTML="Content Updated using JavaScript DOM!";
}

// jQuery effects
$(document).ready(function(){

$("#hideBtn").click(function(){
$("#box").hide();
});

$("#showBtn").click(function(){
$("#box").show();
});

$("#toggleBtn").click(function(){
$("#box").toggle();
});

$("#animateBtn").click(function(){
$("#box").animate({
left:'250px',
height:'250px',
width:'250px'
});
});

});

</script>

</body>
</html>
